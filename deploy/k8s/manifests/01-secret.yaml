# =========================================================================
# AegisGate Security Platform — Secrets
# =========================================================================
# THIS IS A TEMPLATE - DO NOT COMMIT ACTUAL SECRET VALUES
# Use: kubectl create secret generic aegisgate-platform-secrets \
#        --from-literal=openai-api-key=YOUR_KEY \
#        --from-literal=jwt-signing-key=$(openssl rand -base64 32) \
#        --from-literal=api-auth-token=$(openssl rand -hex 16) \
#        -n aegisgate
#
# Or encrypt with: kubeseal / SealedSecrets / External Secrets Operator
# =========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aegisgate-platform-secrets
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate-platform
    app.kubernetes.io/version: "1.3.2"
type: Opaque
stringData:
  # Required: OpenAI API Key for LLM proxy functionality
  # Get from: https://platform.openai.com/api-keys
  openai-api-key: "REPLACE_WITH_OPENAI_API_KEY"

  # Required: JWT signing key for API authentication
  # Generate: openssl rand -base64 32
  jwt-signing-key: "REPLACE_WITH_JWT_SIGNING_KEY"

  # Required: Static API token for service-to-service auth
  # Generate: openssl rand -hex 16
  api-auth-token: "REPLACE_WITH_API_AUTH_TOKEN"

  # Optional: GitHub token for MCP tool functionality
  github-token: ""

  # Optional: Additional provider API keys
  anthropic-api-key: ""
  cohere-api-key: ""
---
