# =========================================================================
# AegisGate Security Platform — NetworkPolicy
# =========================================================================
# Restrict traffic to only expected paths:
#   - Ingress: proxy (8080), MCP (8081), dashboard (8443)
#   - Egress: DNS, upstream AI API, HTTPS for outbound calls
# =========================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisgate-platform
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aegisgate-platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic to all three service ports
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
        - port: 8443
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS outbound (proxy to upstream AI APIs)
    - ports:
        - port: 443
          protocol: TCP
    # Allow HTTP outbound (health checks to upstream)
    - ports:
        - port: 80
          protocol: TCP