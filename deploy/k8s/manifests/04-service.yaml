# =========================================================================
# AegisGate Security Platform — Service
# =========================================================================
# ClusterIP service exposing all three ports.
# For external access, use an Ingress or change to LoadBalancer.
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: aegisgate-platform
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate-platform
    app.kubernetes.io/version: "1.3.1"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegisgate-platform
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
    - name: mcp
      port: 8081
      targetPort: mcp
      protocol: TCP
    - name: dashboard
      port: 8443
      targetPort: dashboard
      protocol: TCP