# =========================================================================
# AegisGate Security Platform — HorizontalPodAutoscaler
# =========================================================================
# Scales based on CPU for Professional+ tiers with >1 replica.
# Community tier: not applicable (single replica, rate-limited).
# =========================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegisgate-platform
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegisgate-platform
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80