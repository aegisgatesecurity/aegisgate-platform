apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aegisgate-platform
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegisgate-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aegisgate-platform.selectorLabels" . | nindent 6 }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "aegisgate-platform.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-aegisgate" .Release.Name) }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aegisgate-platform
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--proxy-port={{ .Values.ports.proxy }}"
            - "--mcp-port={{ .Values.ports.mcp }}"
            - "--dashboard-port={{ .Values.ports.dashboard }}"
            - "--embedded-mcp"
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: AEGISGATE_DATA_DIR
              value: /data
            - name: AEGISGATE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-secrets
                  key: license-key
                  optional: true
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secrets }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-secrets
                  key: {{ $key }}
            {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.ports.proxy }}
              protocol: TCP
            - name: mcp
              containerPort: {{ .Values.ports.mcp }}
              protocol: TCP
            - name: dashboard
              containerPort: {{ .Values.ports.dashboard }}
              protocol: TCP
          {{- with .Values.healthCheck }}
          livenessProbe:
            httpGet:
              path: {{ .dashboard.path }}
              port: {{ .dashboard.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .dashboard.path }}
              port: {{ .dashboard.port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- range .Values.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" .Release.Name) }}
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          {{- toYaml .source | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}