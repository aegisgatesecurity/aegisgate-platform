{{- if .Values.secrets.enabled }}
# =========================================================================
# AegisGate Security Platform — Helm Managed Secrets
# =========================================================================
# WARNING: Only use for development. Production should use:
#   - External Secrets Operator
#   - Sealed Secrets (kubeseal)
#   - Vault sidecar injection
#   - Manual secret creation
# =========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegisgate-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegisgate-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  openai-api-key: {{ required "OpenAI API key is required" .Values.secrets.openaiApiKey | quote }}
  jwt-signing-key: {{ required "JWT signing key is required" .Values.secrets.jwtSigningKey | quote }}
  api-auth-token: {{ required "API auth token is required" .Values.secrets.apiAuthToken | quote }}
  {{- if .Values.secrets.githubToken }}
  github-token: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.cohereApiKey }}
  cohere-api-key: {{ .Values.secrets.cohereApiKey | quote }}
  {{- end }}
{{- end }}
