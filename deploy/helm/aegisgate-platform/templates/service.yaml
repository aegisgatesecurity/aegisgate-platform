apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-aegisgate-platform
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegisgate-platform.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.metrics.serviceMonitor.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.ports.dashboard | quote }}
    prometheus.io/path: {{ .Values.metrics.path | quote }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "aegisgate-platform.selectorLabels" . | nindent 4 }}
  ports:
    - name: proxy
      port: {{ .Values.ports.proxy }}
      targetPort: proxy
      protocol: TCP
    - name: mcp
      port: {{ .Values.ports.mcp }}
      targetPort: mcp
      protocol: TCP
    - name: dashboard
      port: {{ .Values.ports.dashboard }}
      targetPort: dashboard
      protocol: TCP