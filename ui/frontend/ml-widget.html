<!-- ML Stats Widget Container
     =========================
     Add this to your dashboard HTML to include the ML anomaly detection widget
-->

<!-- ML Stats Widget -->
<div id="ml-stats-widget" class="widget-container">
    <!-- Widget will be rendered here by JavaScript -->
</div>

<!-- Include required scripts and styles -->
<link rel="stylesheet" href="/css/ml-stats-widget.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/ml-stats-widget.js"></script>

<!-- Initialize widget -->
<script>
    // Wait for DOM and Chart.js to load
    document.addEventListener('DOMContentLoaded', function() {
        // Check if Chart.js is available
        if (typeof Chart !== 'undefined') {
            MLStatsWidget.init('ml-stats-widget', {
                sensitivity: 'medium',
                showPromptInjection: true,
                showContentAnalysis: true,
                showBehavioral: true,
                refreshInterval: 5000
            });
        } else {
            // Fallback: load Chart.js first
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
            script.onload = function() {
                MLStatsWidget.init('ml-stats-widget', {
                    sensitivity: 'medium',
                    showPromptInjection: true,
                    showContentAnalysis: true,
                    showBehavioral: true
                });
            };
            document.head.appendChild(script);
        }
    });
</script>
