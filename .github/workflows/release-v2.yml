# AegisGate Security Platform - Release Workflow v2
# ============================================================================
# Triggers: tag push (v*) or manual dispatch
# Jobs: build-binary → build-container → sbom-attest
# Signing: keyless (Sigstore/Fulcio + Rekor) via GitHub OIDC
# SBOM: Syft SPDX-JSON, attested with Cosign
# ============================================================================

name: Release & Signing v2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.3.8)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.25.9'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aegisgate-platform

jobs:
  # ========================================================================
  # JOB 1: Build Binary
  # ========================================================================
  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.created_at }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT:0:8} -X main.buildDate=${BUILD_DATE}" \
            -o dist/aegisgate-platform \
            cmd/aegisgate-platform/main.go

      - name: Generate SHA256 checksum
        run: |
          cd dist
          sha256sum aegisgate-platform > aegisgate-platform.sha256

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binary
        run: |
          cd dist
          cosign sign-blob --yes --bundle aegisgate-platform.bundle aegisgate-platform

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/aegisgate-platform
            dist/aegisgate-platform.sha256
            dist/aegisgate-platform.bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========================================================================
  # JOB 2: Build & Sign Container Image
  # ========================================================================
  build-container:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      image_digest: ${{ steps.docker_build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.created_at }}

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          echo "Signing image: ${IMAGE_REF}"
          cosign sign --yes ${IMAGE_REF}

      - name: Verify signature
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/.*" \
            --certificate-oidc-issuer-regexp "https://token.actions.githubusercontent.com" \
            ${IMAGE_REF}

  # ========================================================================
  # JOB 3: SBOM Generation & Attestation
  # ============================================================================
  # Key fixes from previous failures:
  #   1. syft -o spdxjson writes file directly (avoids redirect issues)
  #   2. docker/login-action + COSIGN_EXPERIMENTAL=1 for proper GHCR auth
  #   3. Uses image digest for attestation (not tag) for collision safety
  # ============================================================================

  sbom-attest:
    name: SBOM Attestation
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      COSIGN_EXPERIMENTAL: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.19.0
          syft version

      - name: Generate SBOM
        id: sbom
        run: |
          # Use -o flag to write directly (avoids shell redirect issues with empty files)
          syft dir:. -o spdxjson --output sbom.spdx.json
          # Verify the SBOM was actually created and is valid JSON
          if [ ! -s sbom.spdx.json ]; then
            echo "::error::SBOM file is empty or missing"
            exit 1
          fi
          echo "✅ SBOM generated: $(wc -l < sbom.spdx.json) lines, $(wc -c < sbom.spdx.json) bytes"
          # Quick sanity check it's valid JSON
          python3 -c "import json; json.load(open('sbom.spdx.json')); print('SBOM JSON valid')"

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest SBOM to image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_DIGEST: ${{ needs.build-container.outputs.image_digest }}
        run: |
          # Use digest-based reference for attestation (more reliable than tag)
          if [ -n "${IMAGE_DIGEST}" ]; then
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          else
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          fi
          echo "Attesting SBOM to: ${IMAGE_REF}"
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE_REF}"

      - name: Verify SBOM attestation
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_DIGEST: ${{ needs.build-container.outputs.image_digest }}
        run: |
          if [ -n "${IMAGE_DIGEST}" ]; then
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          else
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          fi
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "https://github.com/.*" \
            --certificate-oidc-issuer-regexp "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"
          echo "✅ SBOM attestation verified"

      - name: Upload SBOM to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}