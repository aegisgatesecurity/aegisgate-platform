name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
env:
  GO_VERSION: '1.25.9'

permissions:
  contents: read
  packages: write

jobs:
  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on all commits
        run: |
          echo "## DCO Verification" >> $GITHUB_STEP_SUMMARY
          MISSING=0
          BOT_COMMITS=0
          # For PRs: check all commits between base and head (strict enforcement)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format="%H" origin/${{ github.base_ref }}..HEAD)
            STRICT=1
          else
            # For pushes/schedule: check the latest commit (advisory only)
            COMMITS=$(git log --format="%H" -1)
            STRICT=0
          fi
          for COMMIT in $COMMITS; do
            AUTHOR=$(git log --format="%an" -1 $COMMIT)
            # Exempt bot authors (dependabot, renovate, etc.) from DCO
            if echo "$AUTHOR" | grep -qiE '(dependabot|renovate|github-actions)\[bot\]$|bot$'; then
              SUBJECT=$(git log --format="%s" -1 $COMMIT)
              echo "⏭️ Skipping DCO for bot commit: $SUBJECT ($AUTHOR)" >> $GITHUB_STEP_SUMMARY
              BOT_COMMITS=$((BOT_COMMITS + 1))
              continue
            fi
            SIGNOFF=$(git log --format="%B" -1 $COMMIT | grep -c "Signed-off-by:" || true)
            if [ "$SIGNOFF" -eq 0 ]; then
              EMAIL=$(git log --format="%ae" -1 $COMMIT)
              SUBJECT=$(git log --format="%s" -1 $COMMIT)
              echo "❌ Missing Signed-off-by: $SUBJECT ($AUTHOR <$EMAIL>)" >> $GITHUB_STEP_SUMMARY
              echo "   Fix: git commit --amend -s" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See [DCO.md](DCO.md) for instructions on signing your commits." >> $GITHUB_STEP_SUMMARY
            if [ "$STRICT" -eq 1 ]; then
              echo "❌ DCO check failed — all PR commits must include Signed-off-by"
              exit 1
            else
              echo "⚠️ DCO advisory: commits without Signed-off-by detected"
            fi
          else
            if [ "$BOT_COMMITS" -gt 0 ]; then
              echo "✅ All human commits have Signed-off-by; $BOT_COMMITS bot commit(s) exempted" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ All commits have valid Signed-off-by lines" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  test:
    name: Test Suite
    needs: dco
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          # Exclude packages that require external services (Stripe, SMTP)
          # and stub packages from coverage calculation
          go test -coverprofile=coverage.out \
            $(go list ./pkg/... | grep -v "/compliance" | grep -v "/upstream/" | grep -v "/billing" | grep -v "/email" | grep -v "/stores") \
            2>&1 | tee test-results.txt

      - name: Run integration tests
        run: |
          go test -tags=integration -v ./tests/integration/... 2>&1 | tee -a test-results.txt

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Check coverage threshold (80% minimum)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage below 80% (required threshold)"
            exit 1
          else
            echo "✅ Coverage meets 80% threshold"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.txt
            coverage.html
            coverage.txt
            coverage.out

  govulncheck:
    name: govulncheck
    needs: dco
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          echo "## govulncheck Results" >> $GITHUB_STEP_SUMMARY
          govulncheck ./... 2>&1 | tee govulncheck-results.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "⚠️ Vulnerabilities found - see results" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No Go vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload govulncheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-results
          path: govulncheck-results.txt
          retention-days: 30

  docker-push:
    name: Docker Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aegisgate-platform:latest
            ghcr.io/${{ github.repository }}/aegisgate-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint (golangci-lint)
    needs: dco
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./... 2>&1 | tee lint-results.txt

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: lint-results.txt
          retention-days: 30

      - name: Fail on lint errors
        run: |
          if grep -q "issues" lint-results.txt 2>/dev/null; then
            echo "⚠️ Linting issues found - see results"
            exit 1
          fi
