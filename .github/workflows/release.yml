name: Release & Signing

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.3.8)'
        required: true
        type: string

env:
  GO_VERSION: '1.25.9'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aegisgate-platform

jobs:
  # Job 1: Build Binary
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    outputs:
      checksum: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -z "$VERSION" ] || [ "$VERSION" == "${GITHUB_REF}" ]; then
            VERSION="${{ inputs.version }}"
          fi
          echo "Building version: $VERSION"
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=$VERSION" \
            -o aegisgate-platform ./cmd/aegisgate-platform

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          sha256sum aegisgate-platform > aegisgate-platform.sha256
          echo "sha256=$(cat aegisgate-platform.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          cat aegisgate-platform.sha256

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: aegisgate-binary
          path: aegisgate-platform
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: aegisgate-platform.sha256
          retention-days: 365

  # Job 2: Build and Sign Container Image
  build-image:
    name: Build & Sign Container Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify and print image digest
        run: |
          echo "Image digest: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform@${{ steps.build.outputs.digest }}"

      - name: Sign container image (SBOM + provenance)
        run: |
          echo "🔏 Signing container image with cosign..."
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:latest | cut -d@ -f2)
          IMAGE_REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform@${IMAGE_DIGEST}"
          
          # Sign with keyless (GitHub OIDC)
          cosign sign --yes $IMAGE_REF
          
          echo "✅ Container image signed"

      - name: Attest container image (SBOM)
        run: |
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:latest | cut -d@ -f2)
          IMAGE_REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform@${IMAGE_DIGEST}"
          
          # Generate SBOM and attest
          cosign attest --yes --type spdxjson $IMAGE_REF
          
          echo "✅ SBOM attestation created"

      - name: Verify signature
        run: |
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:latest | cut -d@ -f2)
          IMAGE_REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform@${IMAGE_DIGEST}"
          
          cosign verify $IMAGE_REF
          echo "✅ Container image verified"

  # Job 3: Sign Binary (for binary distribution)
  sign-binary:
    name: Sign Binary
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: aegisgate-binary
          path: .

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binary with keyless
        env:
          GIT_IDENTITY_FILE: /tmp/key.pem
        run: |
          # Keyless signing using GitHub OIDC
          cosign sign-blob --yes \
            --bundle aegisgate-platform.bundle \
            --output-signature aegisgate-platform.sig \
            aegisgate-platform
          
          echo "✅ Binary signed"

      - name: Upload signature
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: |
            aegisgate-platform.sig
            aegisgate-platform.bundle
          retention-days: 365

  # Job 4: Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, sign-binary]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            artifacts/aegisgate-binary/aegisgate-platform
            artifacts/checksums/aegisgate-platform.sha256
            artifacts/signatures/aegisgate-platform.sig
            artifacts/signatures/aegisgate-platform.bundle
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 5: Generate and Attest SBOM
  sbom-attest:
    name: SBOM Attestation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Syft
        uses: anchore/sbom-action@v0

      - name: Generate SBOM
        run: |
          syft scan dir:./ \
            --output-format spdxjson \
            --file sbom.spdx.json

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest SBOM to image
        run: |
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform:latest 2>/dev/null | cut -d@ -f2 || echo "")
          if [ -n "$IMAGE_DIGEST" ]; then
            IMAGE_REF="${{ env.REGISTRY }}/${{ github.repository_owner }}/aegisgate-platform@${IMAGE_DIGEST}"
            cosign attest --yes --type spdxjson \
              --predicate sbom.spdx.json \
              $IMAGE_REF
            echo "✅ SBOM attested to container image"
          else
            echo "⚠️ Skipping SBOM attestation (image not available)"
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 365
