version: 2

enable-beta-ecosystems: true

updates:
  # Go modules — ignore vendored upstream modules (no external repo)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    reviewers:
      - "aegisgatesecurity"
    ignore:
      # Vendored upstream — no external repo, local replace only
      - dependency-name: "github.com/aegisgatesecurity/aegisgate"
      - dependency-name: "github.com/aegisgatesecurity/aegisgate/*"
      - dependency-name: "github.com/aegisguardsecurity/aegisguard"
      - dependency-name: "github.com/aegisguardsecurity/aegisguard/*"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "aegisgatesecurity"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    reviewers:
      - "aegisgatesecurity"