# =========================================================================
# AegisGate Security Platform - Configuration
# =========================================================================
# This is the unified configuration file for the AegisGate Security Platform.
# It drives both the AegisGate (API proxy) and AegisGuard (MCP agent) subsystems.
# =========================================================================

platform:
  version: "2.0.0-dev"
  mode: "standalone"           # "standalone" (embedded MCP) or "connected" (external AegisGuard)
  shutdown_timeout: 30s

proxy:
  bind_address: ":8080"
  upstream: "https://api.openai.com"
  max_body_size: 10485760       # 10MB
  max_conns: 1000
  timeout: 30s
  rate_limit: 200               # requests per minute
  log_level: "info"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  ml:
    enabled: true
    sensitivity: "medium"
    block_on_critical: true
    block_on_high: false
    sample_rate: 100
    enable_prompt_injection: true
    prompt_injection_sensitivity: 75
    enable_content_analysis: true
    enable_behavioral_analysis: false  # Enterprise only
  security:
    enable_fips: false
    enable_audit_logging: true
    audit_log_path: "/var/log/aegisgate/audit.log"
    enable_opsec: true
    enable_security_headers: true
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - HEAD

agent:
  server:
    host: "0.0.0.0"
    port: 8081
    read_timeout: 30s
    write_timeout: 30s
    idle_timeout: 300s
  logging:
    level: "info"
    format: "json"
  policies:
    default_allow:
      - file_read
      - web_search
      - code_search
    high_risk:
      - shell_command
      - code_execute
      - database_write
      - file_delete
    require_approval:
      - file_write
      - network_call
  audit:
    enabled: true
    format: "json"
  tls:
    enabled: false
  bridge:
    enabled: true
    aegisgate_url: "http://localhost:8080"
    timeout: 30s
    skip_tls_verify: false
    max_retries: 3
  rbac:
    enabled: true
    default_action: "deny"
    default_role: "restricted"
  license:
    enabled: true
    fail_open: false
    cache_duration: 5m

dashboard:
  enabled: true
  bind_addr: "0.0.0.0"
  port: 8443
  ui_dir: "ui/frontend"

tls:
  enabled: false
  cert_dir: "./certs"
  auto_generate: true            # Auto-generate self-signed certs for dev
  min_version: "1.2"
  mutual_tls:
    enabled: false
    mode: "optional"
    client_ca_file: ""
  fips:
    enabled: false
    level: "140-2"

security:
  enable_security_headers: true
  enable_csrf: true
  enable_xss: true
  enable_panic_recovery: true
  enable_audit_middleware: true
  allowed_origins: []
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - HEAD
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
    - X-API-Key
    - X-CSRF-Token

logging:
  level: "info"
  format: "json"