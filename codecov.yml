codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        # Require 80% coverage for the platform code
        target: 80%
        threshold: 2%

    patch:
      default:
        target: 80%
        threshold: 2%

comment:
  layout: "reach,diff,flags,files"
  behavior: default

# Exclude vendor/upstream code from coverage calculations
# These are external dependencies that should be tested upstream
ignore:
  - "upstream/**"
  - "vendor/**"
  - "**/*_test.go"  # Test files themselves