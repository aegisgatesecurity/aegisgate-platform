# =========================================================================
# AegisGate Test Lab - Docker Compose Configuration
# =========================================================================

services:
  # ---------------------------------------------------------------------------
  # Keycloak - Real OIDC + SAML Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: aegisgate-keycloak
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    ports:
      - "8080:8080"
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /realms/master HTTP/1.1\r\nhost: localhost\r\n\r\n' >&3;timeout 1 cat <&3 | grep -q '200 OK' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - aegisgate-test

  # ---------------------------------------------------------------------------
  # PostgreSQL - Test Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aegisgate-postgres-test
    environment:
      POSTGRES_DB: aegisgate_test
      POSTGRES_USER: aegisgate
      POSTGRES_PASSWORD: aegisgate_test_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisgate -d aegisgate_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aegisgate-test

  # ---------------------------------------------------------------------------
  # Redis - Session Store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aegisgate-redis-test
    ports:
      - "6379:6379"
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aegisgate-test

  # ---------------------------------------------------------------------------
  # AegisGate Test Instance - Internal only (accessible from audit container)
  # ---------------------------------------------------------------------------
  aegisgate-test:
    build:
      context: ..
      dockerfile: testlab/Dockerfile.testlab
    container_name: aegisgate-test-instance
    hostname: aegisgate-test
    environment:
      AEGISGATE_TIER: developer
      DATABASE_URL: postgres://aegisgate:aegisgate_test_pass@postgres:5432/aegisgate_test?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      SSO_OIDC_ISSUER_URL: http://keycloak:8080/realms/aegisgate
      SSO_OIDC_CLIENT_ID: aegisgate-platform
      SSO_OIDC_CLIENT_SECRET: aegisgate-oidc-secret
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_TLS_ENABLED: "false"
      LOG_LEVEL: debug
      MCP_ENABLED: "true"
      MCP_PORT: 9090
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aegisgate-test

  # ---------------------------------------------------------------------------
  # Audit Container - Runs security tests
  # ---------------------------------------------------------------------------
  audit-runner:
    image: alpine:latest
    container_name: aegisgate-audit
    hostname: aegisgate-audit
    environment:
      - AEGISGATE_TARGET=http://aegisgate-test:8080
      - AEGISGATE_DASHBOARD=http://aegisgate-test:8443
    volumes:
      - /home/chaos/Desktop/AegisGate/audit-lab/audit-scripts:/audit-scripts:ro
      - /home/chaos/Desktop/AegisGate/audit-lab/audit-results:/audit-results:rw
    command: >
      sh -c "apk add --no-cache curl bash jq && 
             echo 'Audit container ready. Run: docker compose exec audit-runner /audit-scripts/10-license-bypass.sh' &&
             sleep infinity"
    networks:
      - aegisgate-test

volumes:
  keycloak-data:
  postgres-test-data:
  redis-test-data:

networks:
  aegisgate-test:
    driver: bridge
    name: aegisgate-test-net
