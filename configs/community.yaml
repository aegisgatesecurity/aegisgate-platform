# =========================================================================
# AegisGate Security Platform — Community Tier Configuration
# =========================================================================
# This is the default configuration for the Community (free) tier.
# For paid tiers, see configs/developer.yaml and configs/professional.yaml.
#
# Environment variables take precedence over this file:
#   LICENSE_KEY           — License key (empty = Community tier)
#   ADMIN_PANEL_URL       — License validation API
#   AEGISGATE_BIND_ADDRESS — Proxy bind address
#   AEGISGATE_UPSTREAM    — Upstream AI provider URL
#   AEGISGATE_RATE_LIMIT_PROXY — Proxy requests per minute
#   AEGISGATE_RATE_LIMIT_MCP   — MCP tool calls per minute
#   AEGISGATE_DASHBOARD_PORT — Dashboard port
#   AEGIS_PORT            — MCP server port
#   AEGIS_LOG_LEVEL       — Log level
#   DASHBOARD_AUTH_TOKEN  — Dashboard authentication token
# =========================================================================

# Platform mode: "standalone" (embedded MCP server) or "connected" (external scanner)
platform:
  mode: "standalone"    # Community runs everything in one process

# Proxy (AegisGate) — AI API security gateway
proxy:
  bind_address: "0.0.0.0:8080"
  upstream: "https://api.openai.com"
  rate_limit_proxy: 120  # proxy RPM (Community tier)
  rate_limit_mcp: 60     # MCP RPM (Community tier)
  log_level: "info"

# TLS — auto-generated self-signed certs on first startup (Community tier)
tls:
  enabled: false
  # cert_file: "/data/certs/server.crt"
  # key_file: "/data/certs/server.key"
  # min_version: "1.3"
  auto_generate: true    # auto-generate self-signed cert + CA on first run
  cert_dir: "/data/certs"

# Dashboard — admin UI and API
dashboard:
  enabled: true
  bind_addr: "0.0.0.0"
  port: 8443
  ui_dir: "ui/frontend"  # relative to binary or absolute path

# Agent (AegisGuard) — MCP agent security
agent:
  server:
    host: "0.0.0.0"
    port: 8081           # MCP server port (different from proxy port 8080)
    read_timeout: "30s"
    write_timeout: "30s"
    idle_timeout: "5m"
  logging:
    level: "info"
    format: "json"
  policies:
    default_allow:
      - "file_read"
      - "web_search"
      - "code_search"
      - "http_get"
    high_risk:
      - "shell_command"
      - "code_execute"
      - "database_write"
      - "file_delete"
    require_approval:
      - "file_write"
      - "network_call"
      - "database_query"
  audit:
    enabled: true
    format: "json"
    events:
      - "session_start"
      - "session_end"
      - "tool_call"
      - "tool_denied"
      - "policy_denial"
      - "risk_alert"
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20

# Security settings
security:
  enable_security_headers: true
  enable_csrf: false       # API-first; enable for browser-only deployments
  enable_audit: true
  audit_level: "standard"

# Logging
logging:
  level: "info"
  format: "json"

# FIPS (Community: disabled)
fips:
  enabled: false