# =========================================================================
# AegisGate Security Platform — Developer Tier Configuration
# =========================================================================
# Includes all Community features plus:
#   - OAuth SSO / OIDC authentication
#   - Multi-provider support (Anthropic, Azure OpenAI, Cohere)
#   - Request caching
#   - Higher rate limits
# =========================================================================

platform:
  mode: "standalone"

proxy:
  bind_address: "0.0.0.0:8080"
  upstream: "https://api.openai.com"
  rate_limit: 600       # 600 req/min (Developer tier)
  log_level: "info"

tls:
  enabled: true
  min_version: "1.3"
  auto_generate: false

dashboard:
  enabled: true
  bind_addr: "0.0.0.0"
  port: 8443
  ui_dir: "ui/frontend"

agent:
  server:
    host: "0.0.0.0"
    port: 8081
    read_timeout: "30s"
    write_timeout: "30s"
    idle_timeout: "5m"
  logging:
    level: "info"
    format: "json"
  policies:
    default_allow:
      - "file_read"
      - "web_search"
      - "code_search"
      - "http_get"
    high_risk:
      - "shell_command"
      - "code_execute"
      - "database_write"
      - "file_delete"
    require_approval:
      - "file_write"
      - "network_call"
      - "database_query"
  audit:
    enabled: true
    format: "json"
    events:
      - "session_start"
      - "session_end"
      - "tool_call"
      - "tool_denied"
      - "policy_denial"
      - "risk_alert"
  rate_limit:
    enabled: true
    requests_per_minute: 1000
    burst: 200

security:
  enable_security_headers: true
  enable_csrf: true
  enable_audit: true
  audit_level: "detailed"

logging:
  level: "info"
  format: "json"

fips:
  enabled: false